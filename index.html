        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass { 
            background: rgba(15, 15, 17, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .glass-card {
            background: linear-gradient(180deg, rgba(24, 24, 27, 0.8) 0%, rgba(15, 15, 17, 0.95) 100%);
            border: 1px solid rgba(234, 179, 8, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(234, 179, 8, 0.4);
            box-shadow: 0 12px 40px rgba(234, 179, 8, 0.15), inset 0 0 20px rgba(234, 179, 8, 0.05);
            transform: translateY(-4px);
        }

        .gold-gradient-text { 
            background: linear-gradient(135deg, #fef08a 0%, #eab308 50%, #a16207 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .gold-glow {
            position: absolute;
            background: radial-gradient(circle, rgba(234,179,8,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #eab308; }

        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .shiny-overlay { 
            mix-blend-mode: color-dodge; 
            animation: pulseShiny 3s infinite alternate ease-in-out; 
        }
        @keyframes pulseShiny { 
            0% { opacity: 0.3; filter: brightness(1); } 
            100% { opacity: 0.9; filter: brightness(1.5); } 
        }

        .hero-banner {
            background-image: linear-gradient(to bottom, rgba(5,5,5,0.2) 0%, #050505 100%), url('https://iili.io/ByoDDdP.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .ratio-bar-bg { background: #ef4444; height: 6px; border-radius: 4px; overflow: hidden; width: 100%; }
        .ratio-bar-fg { background: #22c55e; height: 100%; border-radius: 4px; }
        
        .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

                fetch(`https://indexer-t9l1.onrender.com/api/proxy/thumbnail/84696847629147`)
                    .then(res => res.json())
                    .then(data => setShinyOverlayUrl(data.imageUrl)).catch(() => {});
                
                fetchDbData();
                fetchRobloxData();
            }, []);

            const fetchRobloxData = async () => {
                setRobloxLoading(true);
                try {
                    const groupRes = await fetch(`https://groups.roproxy.com/v1/groups/${GROUP_ID}`);
                    const groupInfo = await groupRes.json();
                    
                    const gamesRes = await fetch(`https://games.roproxy.com/v2/groups/${GROUP_ID}/games?accessFilter=Public&limit=10&sortOrder=Desc`);
                    const gamesList = await gamesRes.json();

                    const detailedGames = await Promise.all((gamesList.data || []).map(async (g) => {
                        const uId = g.id;
                        try {
                            const [info, votes, favs, icon, thumbs] = await Promise.all([
                                fetch(`https://games.roproxy.com/v1/games?universeIds=${uId}`).then(r=>r.json()),
                                fetch(`https://games.roproxy.com/v1/games/votes?universeIds=${uId}`).then(r=>r.json()),
                                fetch(`https://games.roproxy.com/v1/games/${uId}/favorites/count`).then(r=>r.json()),
                                fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${uId}&size=512x512&format=Png&isCircular=false`).then(r=>r.json()),
                                fetch(`https://thumbnails.roproxy.com/v1/games/multiget/thumbnails?universeIds=${uId}&countPerUniverse=10&defaults=true&size=768x432&format=Png&type=GameThumbnail`).then(r=>r.json())
                            ]);
                            return {
                                ...info.data[0],
                                upVotes: votes.data[0]?.upVotes || 0,
                                downVotes: votes.data[0]?.downVotes || 0,
                                favorites: favs.favoritesCount || 0,
                                iconUrl: icon.data[0]?.imageUrl || 'https://placehold.co/512x512/0a0a0c/3f3f46?text=No+Icon',
                                thumbnails: (thumbs.data[0]?.thumbnails || []).map(t=>t.imageUrl)
                            };
                        } catch (e) { return null; }
                    }));

                    const validGames = detailedGames.filter(g => g !== null);

                    const wallRes = await fetch(`https://groups.roproxy.com/v2/groups/${GROUP_ID}/wall/posts?limit=10&sortOrder=Desc`);
                    const wallData = await wallRes.json();

                    setGroupData(groupInfo);
                    setGamesData(validGames);
                    setWallPosts(wallData.data || []);

                    console.error("Roblox API Error:", err);
                }
                setRobloxLoading(false);

            const fetchDbData = async () => {
                setDbLoading(true);
                setDbError('');
                try {
                    const res = await fetch('https://indexer-t9l1.onrender.com/api/get-all-slugs');
                    if (!res.ok) throw new Error('API Offline');
                    const data = await res.json();
                    const existMap = new Map();
                    if (data.slugs) data.slugs.forEach(s => existMap.set(s.slugName, s.totalExists));
                    setSlugDataWithExists(ALL_SLUGS.map(slug => ({ ...slug, totalExists: existMap.get(slug.Name) || 0 })));
                } catch (err) {
                    setDbError(err.message);
                    setSlugDataWithExists(ALL_SLUGS.map(s => ({ ...s, totalExists: 'N/A' })));

                    setDbLoading(false);

                const id = Date.now();
                setToasts(prev => [...prev, { id, message: msg, type }]);

            const toggleBookmark = (slugName, e) => {
                e.stopPropagation();
                const updated = new Set(bookmarks);
                if (updated.has(slugName)) { updated.delete(slugName); addToast('Removed from collection', 'info'); }

            const filteredData = React.useMemo(() => {
                let res = [...slugDataWithExists];

                if (rarityFilter !== 'All') res = res.filter(s => s.Rarity === rarityFilter);
                if (variantFilter !== 'All') res = res.filter(s => s.VariantLabel === variantFilter);
                if (showBookmarksOnly) res = res.filter(s => bookmarks.has(s.Name));

                    switch (sortBy) {
                        case 'Chance (Asc)': return a.Chance - b.Chance;
                        case 'Chance (Desc)': return b.Chance - a.Chance;
                        case 'Name (A-Z)': return a.Name.localeCompare(b.Name);
                        case 'Name (Z-A)': return b.Name.localeCompare(a.Name);
                        case 'Exists (High-Low)': return (typeof b.totalExists === 'number' ? b.totalExists : -1) - (typeof a.totalExists === 'number' ? a.totalExists : -1);
                        case 'Power (High-Low)': return (b.BaseDamage + b.BaseHealth) - (a.BaseDamage + a.BaseHealth);
                        default: return 0;

                                                            </div>
                                                        </div>
                                                    </div>

                        {activeTab === 'games' && (

                        {activeTab === 'database' && (

                                                            <Icons.Bookmark f={isBk} c={isBk ? "text-yellow-500" : "text-white"} />

                                                        <RobloxImage assetId={slug.Image} isShiny={slug.IsShiny} isBig={slug.IsBig} isHuge={slug.IsHuge} shinyOverlayUrl={shinyOverlayUrl} sizeClass="w-24 h-24 mb-4" />
                                                        
                                                        <h3 className="font-bold text-sm text-zinc-100 truncate w-full mb-1">{slug.Name}</h3>
                                                        <span className={`text-[10px] px-2.5 py-0.5 font-bold uppercase tracking-wider rounded-full border mb-3 ${RARITY_COLORS[slug.Rarity]}`}>{slug.Rarity}</span>
                                                        
                                                        <div className="w-full bg-zinc-900/80 border border-zinc-800 rounded-xl p-2 mt-auto">
                                                            <div className="text-[10px] text-zinc-500 font-medium uppercase">Global Exists</div>
                                                            <div className="font-mono text-sm font-bold text-yellow-500">{typeof slug.totalExists === 'number' ? formatNumber(slug.totalExists) : slug.totalExists}</div>
                                                        </div>
                                                    </div>
                                                );
                                            }
                                            return (
                                                <div key={slug.Name} onClick={() => setSelectedSlug(slug)} className="glass-card rounded-2xl p-3 cursor-pointer flex items-center gap-5 slide-up">
                                                    <RobloxImage assetId={slug.Image} isShiny={slug.IsShiny} isBig={slug.IsBig} isHuge={slug.IsHuge} shinyOverlayUrl={shinyOverlayUrl} sizeClass="w-16 h-16 flex-shrink-0" />
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-3 mb-1">
                                                            <h3 className="font-bold text-lg text-white truncate">{slug.Name}</h3>
                                                            <span className={`text-[10px] px-2 py-0.5 font-bold uppercase tracking-wider rounded-full border ${RARITY_COLORS[slug.Rarity]}`}>{slug.Rarity}</span>
                                                            {isBk && <Icons.Bookmark f={true} c="text-yellow-500 w-4 h-4" />}
                                                        </div>
                                                        <div className="flex gap-5 text-sm font-medium text-zinc-500">
                                                            <div>1 in {formatNumber(slug.Chance)}</div>
                                                            <div className="flex items-center gap-1"><Icons.Sword /> {formatNumber(slug.BaseDamage)}</div>
                                                            <div className="flex items-center gap-1"><Icons.Heart /> {formatNumber(slug.BaseHealth)}</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right pl-6 border-l border-zinc-800">
                                                        <div className="text-[10px] text-zinc-500 font-medium uppercase mb-1">Population</div>
                                                        <div className="font-mono font-bold text-lg text-yellow-500">{typeof slug.totalExists === 'number' ? formatNumber(slug.totalExists) : slug.totalExists}</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {filteredData.length === 0 && <div className="col-span-full py-20 text-center text-zinc-500 font-medium">No variants found matching criteria.</div>}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'about' && (
                            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 fade-in">
                                <div className="text-center mb-12">
                                    <div className="inline-block px-4 py-1.5 bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-sm font-bold uppercase tracking-widest rounded-full mb-6">About The Studio</div>
                                    <h2 className="text-5xl font-black text-white tracking-tighter mb-6">Born in Nairobi.<br/>Played Worldwide.</h2>
                                    <p className="text-zinc-400 text-lg leading-relaxed max-w-2xl mx-auto">1GC Studios is a premier game development collective based in Nairobi, Kenya. We specialize in building highly scalable, mathematically rigorous, and intensely engaging experiences on the Roblox platform.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                                    <div className="glass-card p-8 rounded-3xl text-center flex flex-col items-center justify-center">
                                        <div className="w-16 h-16 rounded-full bg-[#5865F2]/10 flex items-center justify-center text-[#5865F2] mb-4">
                                            <Icons.Discord />
                                        </div>
                                        <h3 className="text-xl font-bold text-white mb-2">Join The Community</h3>
                                        <p className="text-zinc-400 text-sm mb-6">Connect with developers, get exclusive sneak peeks, and trade with thousands of other players.</p>
                                        <a href="https://discord.com/invite/tPeH6e84t5" target="_blank" rel="noreferrer" className="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3 rounded-xl transition-colors">Join Discord Server</a>
                                    </div>
                                    <div className="glass-card p-8 rounded-3xl text-center flex flex-col items-center justify-center">
                                        <div className="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center text-yellow-500 mb-4">
                                            <Icons.Gamepad />
                                        </div>
                                        <h3 className="text-xl font-bold text-white mb-2">Play Slug RNG</h3>
                                        <p className="text-zinc-400 text-sm mb-6">Our flagship title. Roll for the rarest slugs in existence, upgrade your luck, and dominate.</p>
                                        <a href="https://www.roblox.com/games/86351439198186/Slug-RNG" target="_blank" rel="noreferrer" className="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-bold py-3 rounded-xl transition-colors">Play on Roblox</a>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {selectedGame && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md fade-in" onClick={() => setSelectedGame(null)}>

                                <button onClick={() => setSelectedGame(null)} className="absolute top-4 right-4 p-2 rounded-full bg-black/50 text-white hover:bg-zinc-800 transition-colors z-40 border border-zinc-700"><Icons.X /></button>
                                
                                <div className="relative h-64 md:h-80 w-full overflow-hidden">
                                    <img src={selectedGame.thumbnails && selectedGame.thumbnails.length > 0 ? selectedGame.thumbnails[0] : selectedGame.iconUrl} className="w-full h-full object-cover opacity-50 blur-sm" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0c] to-transparent"></div>
                                    <div className="absolute bottom-6 left-6 right-6 flex items-end gap-6">
                                        <img src={selectedGame.iconUrl} className="w-32 h-32 rounded-2xl border-2 border-zinc-700 shadow-2xl object-cover" />
                                        <div className="flex-1 pb-2">
                                            <h2 className="text-3xl md:text-4xl font-black text-white mb-2">{selectedGame.name}</h2>
                                            <div className="flex flex-wrap gap-3">
                                                <div className="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5">
                                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> {selectedGame.playing.toLocaleString()} Playing
                                                </div>
                                                <div className="bg-zinc-800/80 text-zinc-300 border border-zinc-700 px-3 py-1.5 rounded-lg text-sm font-bold">
                                                    By {selectedGame.creator?.name || '1GC Studios'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 md:p-8">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                        <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-1">Total Visits</div>
                                            <div className="font-mono text-xl font-bold text-white">{formatNumber(selectedGame.visits)}</div>
                                        </div>
                                        <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-1">Favorites</div>
                                            <div className="font-mono text-xl font-bold text-white flex items-center gap-2">
                                                {formatNumber(selectedGame.favorites)} <Icons.Star />
                                            </div>
                                        </div>
                                        <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-1">Server Size</div>
                                            <div className="font-mono text-xl font-bold text-white">{selectedGame.maxPlayers} Max</div>
                                        </div>
                                        <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-1">Created</div>
                                            <div className="font-mono text-xl font-bold text-white">{new Date(selectedGame.created).getFullYear()}</div>
                                        </div>
                                    </div>

                                    <div className="mb-8">
                                        <h3 className="text-lg font-bold text-white mb-3 flex items-center gap-2">Community Rating</h3>
                                        <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                            <div className="flex justify-between font-bold text-sm mb-2">
                                                <span className="flex items-center gap-1 text-emerald-400"><Icons.ThumbsUp /> {formatNumber(selectedGame.upVotes)}</span>
                                                <span className="flex items-center gap-1 text-red-400"><Icons.ThumbsDown /> {formatNumber(selectedGame.downVotes)}</span>
                                            </div>
                                            <div className="ratio-bar-bg h-3">
                                                <div className="ratio-bar-fg" style={{width: `${(selectedGame.upVotes / ((selectedGame.upVotes + selectedGame.downVotes)||1)) * 100}%`}}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mb-8">
                                        <h3 className="text-lg font-bold text-white mb-3">About</h3>
                                        <p className="text-zinc-400 text-sm leading-relaxed whitespace-pre-wrap bg-zinc-900/30 p-5 rounded-xl border border-zinc-800/50">{selectedGame.description || "No description provided."}</p>
                                    </div>

                                    {selectedGame.thumbnails && selectedGame.thumbnails.length > 0 && (

                                            <h3 className="text-lg font-bold text-white mb-3">Gallery</h3>

                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 bg-zinc-900/80 border-t border-zinc-800 flex justify-end">
                                    <a href={`https://www.roblox.com/games/${selectedGame.rootPlaceId}`} target="_blank" rel="noreferrer" className="bg-white text-black hover:bg-zinc-200 font-bold px-8 py-3 rounded-xl transition-colors flex items-center gap-2">
                                        <Icons.Play /> Launch on Roblox
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {selectedSlug && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md fade-in" onClick={() => setSelectedSlug(null)}>
                            <div className="glass-card bg-[#0a0a0c] rounded-3xl max-w-md w-full overflow-hidden border border-zinc-700/50" onClick={(e) => e.stopPropagation()}>
                                <div className="relative h-64 bg-zinc-900/50 border-b border-zinc-800 flex items-center justify-center p-6 overflow-hidden">
                                    <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#0a0a0c] z-10"></div>
                                    <button onClick={() => setSelectedSlug(null)} className="absolute top-4 right-4 p-2 rounded-full bg-black/50 text-white hover:bg-zinc-800 transition-colors z-40 border border-zinc-700"><Icons.X /></button>
                                    <RobloxImage assetId={selectedSlug.Image} isShiny={selectedSlug.IsShiny} isBig={selectedSlug.IsBig} isHuge={selectedSlug.IsHuge} shinyOverlayUrl={shinyOverlayUrl} sizeClass="w-48 h-48 z-20" />
                                </div>
                                
                                <div className="p-8 relative">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="text-3xl font-black text-white mb-2">{selectedSlug.Name}</h2>
                                            <div className="flex flex-wrap gap-2">
                                                <span className={`text-xs px-3 py-1 font-bold uppercase tracking-wider rounded-full border ${RARITY_COLORS[selectedSlug.Rarity]}`}>{selectedSlug.Rarity}</span>

                                            </div>
                                        </div>
                                        <div className="text-right bg-zinc-900/80 px-4 py-2 rounded-xl border border-zinc-700/50">
                                            <div className="text-[10px] text-zinc-500 font-bold uppercase mb-1">Exists</div>
                                            <div className="text-xl font-mono font-black gold-gradient-text">{typeof selectedSlug.totalExists === 'number' ? selectedSlug.totalExists.toLocaleString() : selectedSlug.totalExists}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        <div className="p-4 rounded-xl bg-zinc-900/50 border border-zinc-800">
                                            <div className="text-zinc-500 mb-1 text-xs font-bold uppercase">Probability</div>
                                            <div className="font-mono text-sm font-semibold text-zinc-200">1 in {formatNumber(selectedSlug.Chance)}</div>
                                        </div>
                                        <div className="p-4 rounded-xl bg-zinc-900/50 border border-zinc-800">
                                            <div className="text-zinc-500 mb-1 text-xs font-bold uppercase">Asset ID</div>
                                            <div className="font-mono text-sm font-semibold text-zinc-200">{selectedSlug.Image}</div>
                                        </div>
                                        <div className="p-4 rounded-xl bg-red-500/5 border border-red-500/20">
                                            <div className="flex items-center gap-1 text-red-500 mb-1 text-xs font-bold uppercase"><Icons.Sword /> Damage</div>
                                            <div className="font-mono text-sm font-semibold text-red-400">{formatNumber(selectedSlug.BaseDamage)}</div>
                                        </div>
                                        <div className="p-4 rounded-xl bg-emerald-500/5 border border-emerald-500/20">
                                            <div className="flex items-center gap-1 text-emerald-500 mb-1 text-xs font-bold uppercase"><Icons.Heart /> Health</div>
                                            <div className="font-mono text-sm font-semibold text-emerald-400">{formatNumber(selectedSlug.BaseHealth)}</div>
                                        </div>
                                    </div>
                                    <div className="w-full py-3 bg-zinc-900/50 rounded-xl border border-zinc-800 text-center">
                                        <span className="text-xs font-bold text-zinc-500 uppercase mr-2">Total Power Limit</span>
                                        <span className="font-mono font-bold text-yellow-500">{formatNumber(selectedSlug.BaseDamage + selectedSlug.BaseHealth)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-3">
                        {toasts.map(t => (
                            <div key={t.id} className="toast-enter px-5 py-4 rounded-xl shadow-2xl border flex items-center gap-3 backdrop-blur-md bg-zinc-900/95 border-zinc-800">
                                {t.type === 'success' ? <div className="w-2 h-2 rounded-full bg-emerald-500"></div> : <div className="w-2 h-2 rounded-full bg-yellow-500"></div>}
                                <span className="font-semibold text-sm text-white">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
